<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>TechBee AI — AI That Works For You</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Kill the Google Translate toolbar completely ── */
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      .skiptranslate,
      #goog-gt-tt,
      .goog-te-balloon-frame,
      .goog-tooltip,
      .goog-text-highlight,
      .goog-te-ftab-float,
      .goog-te-menu-value,
      .goog-te-gadget-icon {
        display: none !important;
        visibility: hidden !important;
        height: 0 !important;
        overflow: hidden !important;
      }

      body > .skiptranslate {
        display: none !important;
      }

      body {
        top: 0 !important;
        position: static !important;
        margin-top: 0 !important;
      }

      body.arabic-active {
        direction: rtl;
        font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif !important;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="google_translate_element" style="position:absolute;top:-9999px;left:-9999px;"></div>

    <div id="root"></div>

    <script type="text/javascript">
      window.googleTranslateElementInit = function () {
        new window.google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'ar',
            autoDisplay: false,
          },
          'google_translate_element'
        );
      };

      // MutationObserver to re-hide toolbar after Google injects it dynamically
      document.addEventListener("DOMContentLoaded", function () {
        const observer = new MutationObserver(function () {
          const banner = document.querySelector(".goog-te-banner-frame")
          if (banner) {
            banner.style.display = "none"
            document.body.style.top = "0"
          }
          const skip = document.querySelector("body > .skiptranslate")
          if (skip) skip.style.display = "none"
        })
        observer.observe(document.body, { childList: true, subtree: true })
      })
    </script>

    <script
      type="text/javascript"
      src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
      async
    ></script>
  </body>
</html>
